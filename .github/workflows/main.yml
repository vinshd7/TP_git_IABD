name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, feature/frontend, feature/backend, tests]
  pull_request:
    branches: [main, dev]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: taskmanagement/backend/package-lock.json
      - run: npm ci
        working-directory: taskmanagement/backend
      - run: npm run lint
        working-directory: taskmanagement/backend

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: taskmanagement/frontend/package-lock.json
      - run: npm ci
        working-directory: taskmanagement/frontend
      - run: npm run lint
        working-directory: taskmanagement/frontend

  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    needs: lint-backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: taskmanagement/backend/package-lock.json
      - run: npm ci
        working-directory: taskmanagement/backend
      - run: npm test
        working-directory: taskmanagement/backend
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: taskmanagement/frontend/package-lock.json
      - run: npm ci
        working-directory: taskmanagement/frontend
      - run: npm test
        working-directory: taskmanagement/frontend
        env:
          CI: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        if: github.ref == 'refs/heads/dev'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /var/www/task-manager-staging
            git pull origin dev
            cd taskmanagement/backend && npm ci --omit=dev
            cd ../frontend && npm ci && npm run build
            pm2 restart task-manager-staging

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /var/www/task-manager
            git pull origin main
            cd taskmanagement/backend && npm ci --omit=dev
            cd ../frontend && npm ci && npm run build
            pm2 reload task-manager